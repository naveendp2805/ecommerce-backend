spring:
  application:
    name: ecommerce-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 12345678

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  config:
    import: optional:application-secret.yaml

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

file:
  upload-dir: uploads

jwt:
  secret: bXlTdXBlclNlY3JldEtleUZvckp3dEF1dGhlbnRpY2F0aW9uMTIzNDU2
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

razorpay:
  key: ${RAZORPAY_KEY_ID}
  secret: ${RAZORPAY_KEY_SECRET}